<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TowPrecision Fleet Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-header">
      <div class="login-logo">🚚</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your fleet management account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="name@company.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button class="primary-btn" type="submit" style="width: 100%; height: 44px; font-size: 1rem;">Sign In to Dashboard</button>
      
      <div class="demo-credentials">
        <strong>Demo Access</strong><br>
        Driver: eli@towprecision.com<br>
        Operator: sara@towprecision.com<br>
        Admin: alex@towprecision.com
      </div>
    </form>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const user = Auth.login(email);
        
        if (user) {
          if (user.role === 'Driver') window.location.href = 'driver.html';
          else if (user.role === 'Operator') window.location.href = 'operator.html';
          else if (user.role === 'Administrator') window.location.href = 'admin.html';
        } else {
          alert('Invalid email. Use one of the demo emails provided.');
        }
      });
    });
  </script>
</body>
</html>
