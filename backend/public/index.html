<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TowPrecision Fleet Portal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-header">
      <div class="login-logo">🚚</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your fleet management account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="name@company.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button class="primary-btn" type="submit" style="width: 100%; height: 44px; font-size: 1rem;">Sign In to Dashboard</button>
      
      <div class="demo-credentials">
        <strong>Demo Access</strong><br>
        Driver: eli@towprecision.com<br>
        Operator: sara@towprecision.com<br>
        Admin: alex@towprecision.com
      </div>
    </form>
  </main>

  <script>
    // Demo users for testing without Supabase
    const DEMO_USERS = {
      'eli@towprecision.com': { id: 'u1', name: 'Eli Martinez', email: 'eli@towprecision.com', role: 'Driver' },
      'sara@towprecision.com': { id: 'u2', name: 'Sara Malik', email: 'sara@towprecision.com', role: 'Operator' },
      'alex@towprecision.com': { id: 'u3', name: 'Alex Chen', email: 'alex@towprecision.com', role: 'Administrator' }
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      
      // Try API first, fall back to demo if API fails
      let user = null;
      try {
        user = await State.login(email);
      } catch (err) {
        console.warn('API failed, using demo mode:', err);
        user = DEMO_USERS[email] || null;
        if (user) State.setCurrentUser(user);
      }
      
      if (user) {
        if (user.role === 'Driver') window.location.href = 'driver_dashboard.html';
        else if (user.role === 'Operator') window.location.href = 'operator_dashboard.html';
        else if (user.role === 'Administrator') window.location.href = 'admin_dashboard.html';
      } else {
        alert('Invalid email. Use one of the demo emails provided.');
      }
    });
  </script>
</body>
</html>
